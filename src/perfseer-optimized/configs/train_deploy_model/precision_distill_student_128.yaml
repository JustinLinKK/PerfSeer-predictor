run:
  run_id: precision_distill_student_128
  out_dir: runs/optimized
  results_path: runs/results.jsonl
  notes: Smaller precision-aware distilled deployment student; set distillation.teacher_ckpt_dir to the precision teacher run.
seed: 42
data:
  root: dataset
  limit: 0
  num_workers: 0
  split_unit: graph
features:
  use_operator_type_onehot: true
  topology: true
  critical_path: true
  edge_topology: true
  include_destination_tensor: true
  time_target_mode: raw
  target_mode: absolute
  include_precision_features: true
  include_hardware_features: true
  precision_config: fp32_ieee
  hardware_id: source_domain_unknown
  base_label_weight: 1.0
  precision_label_weight: 3.0
  pseudo_label_weight: 1.0
model:
  name: seernet_multi
  hidden: 128
  num_blocks: 2
  head_hidden: 128
  metric_heads: separate
  activation: relu
  dropout: 0.05
  encoder_norm: layernorm
  block_norm: prenorm
  residual: gated
  residual_gate_init: 0.1
  use_synmm: true
  global_agg: synmm
  attention_pool: false
  use_gnpb: true
  include_u_in_edge_update: true
  mlp_z_num_linear_layers: 3
train:
  metric: all
  epochs: 500
  batch_size: 128
  lr: 0.001
  optimizer: adamw
  weight_decay: 0.00001
  patience: 30
  scheduler_patience: 5
  min_lr: 0.000001
  loss: huber_logstd
  huber_delta: 1.0
  grad_clip_norm: 1.0
  ema_decay: 0.0
  device: auto
multi_task:
  enabled: true
  loss_reduction: plain_sum
  loss_weights:
    train_util: 1.0
    train_mem: 0.75
    train_time: 1.5
    infer_util: 1.0
    infer_mem: 0.75
    infer_time: 1.5
distillation:
  enabled: true
  teacher_ckpt_dir:
  alpha: 0.5
  source_hard_alpha: 0.5
  precision_hard_alpha: 1.0
  pseudo_hard_alpha: 0.0
calibration:
  enabled: true
  method: linear
